{% extends 'base.html' %}

{% block content %}
<h1 class="mb-4">Удаление пользователя</h1>
<p>Вы уверены, что хотите удалить <strong>{{ object.get_full_name }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Да, удалить</button>
    <a href="{% url 'users' %}" class="btn btn-secondary ms-2">Нет</a>
</form>
{% endblock %}
