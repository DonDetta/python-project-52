{% extends 'base.html' %}

{% block content %}
<h1 class="mb-4">Пользователи</h1>
<table class="table">
    <thead>
        <tr>
            <th>#</th>
            <th>Имя пользователя</th>
            <th>Полное имя</th>
            <th>Дата создания</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.pk }}</td>
            <td>{{ user.username }}</td>
            <td>{{ user.get_full_name }}</td>
            <td>{{ user.date_joined|date:"d.m.Y" }}</td>
            <td>
                <a href="{% url 'users_update' user.pk %}" class="btn btn-warning btn-sm">Изменить</a>
                <a href="{% url 'users_delete' user.pk %}" class="btn btn-danger btn-sm">Удалить</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
