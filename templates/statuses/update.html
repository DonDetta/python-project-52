{% extends 'base.html' %}
{% load django_bootstrap5 %}

{% block content %}
<h1 class="mb-4">Изменение статуса</h1>
<form method="post" style="max-width: 480px;">
    {% csrf_token %}
    {% bootstrap_form form %}
    <button type="submit" class="btn btn-primary">Изменить</button>
</form>
{% endblock %}
