{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Метки</h1>
    <a href="{% url 'labels_create' %}" class="btn btn-primary">Создать метку</a>
</div>
<table class="table">
    <thead>
        <tr>
            <th>#</th>
            <th>Имя</th>
            <th>Дата создания</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for label in labels %}
        <tr>
            <td>{{ label.pk }}</td>
            <td>{{ label.name }}</td>
            <td>{{ label.created_at|date:"d.m.Y" }}</td>
            <td>
                <a href="{% url 'labels_update' label.pk %}" class="btn btn-warning btn-sm">Изменить</a>
                <a href="{% url 'labels_delete' label.pk %}" class="btn btn-danger btn-sm">Удалить</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
